site_name: OptiHeat
site_url: https://www.optiheat.uk
site_description: Resources to help deliver heat pumps in social housing.
site_author: OptiHeat
site_favicon: images/favicon.png

nav:
  - Home: index.md
  - About: about.md
  - Resources: resources.md
  - Events: events.md
  - Manufacturers: manufacturers.md

theme:
    name: yeti
    custom_dir: theme
    locale: en_GB
    palette: green
    highlightjs:
    analytics:
      gtag: G-PPMW7GPNBR

extra_css:
    - css/extra.css
    - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

markdown_extensions:
  - attr_list
  - tables
  - md_in_html

extra:
  consent:
    title: Cookie consent
    description: > # (1)
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

plugins:
  - redirects:
      redirect_maps:
        'event_feedback.md': 'https://forms.office.com/e/8UmgUqcwqm'
